<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mlodyxun games</title>
    <style>
        /* === CORE STYLES === */
        :root {
            --bg: #050508;
            --text: #e0f0e0;
            --accent1: #ff0055;
            --accent2: #00e5ff;
            --hover: #111118;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            color: var(--accent1);
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-shadow: 3px 3px 0px rgba(255, 0, 85, 0.3);
            margin-bottom: 50px;
        }

        .game-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 100%;
        }

        a {
            height: 50px;
            width: 350px;
            color: var(--accent2);
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: bold;
            border: 2px solid var(--accent2);
            padding: 15px 40px;
            background-color: transparent;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            box-shadow: 4px 4px 0 rgba(0, 229, 255, 0.2);
        }

        a:hover {
            background-color: var(--accent2);
            color: #000;
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(0, 229, 255, 0.4);
        }

        a:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 rgba(0, 229, 255, 0.4);
        }

        .coming-soon {
            margin-top: 80px;
            color: #666;
            font-size: 1.5rem;
            letter-spacing: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

</body>
